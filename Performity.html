<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Performity — Catalys</title>
<link rel="icon" href="assets/logo-icon.png" type="image/png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --accent:#0978BE; --accent-soft:#e9f4fb; --accent-strong:#075f96;
  --good:#12b3a6; --good-soft:#e3f6f4; --bad:#e0506e; --bad-soft:#fcebef;
  --warn:#e8902a; --warn-soft:#fdf0dd; --violet:#6c47ff; --review:#0e7c8b;
  --bg:#f4f8fc; --surface:#ffffff; --surface-2:#f7fafd;
  --border:#e7ebf2; --border-strong:#d4dbe6;
  --text:#0e1626; --text-2:#5b6478; --muted:#8a93a6;
  --radius:12px; --radius-sm:8px;
  --shadow:0 1px 2px rgba(14,22,38,.04), 0 1px 3px rgba(14,22,38,.05);
  --shadow-lg:0 4px 24px rgba(14,22,38,.10);
  --row-py:11px; --card-pad:20px; --kpi-pad:16px;
  --ui:"Inter",system-ui,-apple-system,"Segoe UI",sans-serif; --mono:"IBM Plex Mono",ui-monospace,monospace;
}
body[data-density="compact"]{ --row-py:7px; --card-pad:16px; --kpi-pad:13px; }
body[data-theme="dark"]{
  --accent:#3a9fe0; --accent-soft:#11263a; --accent-strong:#6cb8ee;
  --good:#2bc4b4; --good-soft:#0e2a2a; --bad:#f0708c; --bad-soft:#2e1620;
  --warn:#e8a64a; --warn-soft:#2c2110; --violet:#9a7bff; --review:#3fb5c4;
  --bg:#0d1320; --surface:#151c2c; --surface-2:#1a2334;
  --border:#28324a; --border-strong:#3a4763;
  --text:#e7ecf5; --text-2:#9aa6bd; --muted:#6c7894;
  --shadow:0 1px 2px rgba(0,0,0,.3), 0 1px 3px rgba(0,0,0,.35);
  --shadow-lg:0 6px 28px rgba(0,0,0,.45);
}
body[data-theme="dark"] .topbar{ background:rgba(21,28,44,.85); }
body[data-theme="dark"] .scrum-table thead .grp-row th.grp{ background:#202b42; }
body[data-theme="dark"] .scrum-table thead .grp-row th.gcorner{ background:#202b42; }
body[data-theme="dark"] .scrum-table .total-col{ background:#13283f; }
body[data-theme="dark"] .scrum-table thead .total-col{ background:#16314d; }
body[data-theme="dark"] .scrum-table .year-col{ background:#1d2740; }
body[data-theme="dark"] .scrum-table thead .year-col{ background:#222d49; }
body[data-theme="dark"] .uploader{ background:radial-gradient(1100px 560px at 50% -15%, #1a1740 0%, #0f2030 35%, var(--bg) 70%); }
/* dark-mode contrast: keep text readable on highlighted cells/chips */
body[data-theme="dark"] .chip.on{ background:var(--accent); color:#fff; border-color:var(--accent); }
body[data-theme="dark"] .seg.on{ color:#fff; }
body[data-theme="dark"] .scrum-table tbody tr:hover .metric-col{ background:#15314c; }
body[data-theme="dark"] .scrum-table tbody tr:hover .trend-cell{ background:#15314c; }
body[data-theme="dark"] .data-table tbody tr:hover{ background:var(--accent-soft); }
body[data-theme="dark"] .data-table .sticky{ background:var(--surface); }
body[data-theme="dark"] .roas-pill.good{ background:#0e2a2a; color:#43d6c6; }
body[data-theme="dark"] .roas-pill.warn{ background:#2c2110; color:#f0b75e; }
body[data-theme="dark"] .roas-pill.bad{ background:#2e1620; color:#f58aa2; }
body[data-theme="dark"] .badge.good{ color:#43d6c6; } body[data-theme="dark"] .badge.warn{ color:#f0b75e; }
body[data-theme="dark"] .badge.accent{ color:var(--accent-strong); }
body[data-theme="dark"] .axb{ fill:#43d6c6; }
body[data-theme="dark"] .kpi-value.good{ color:#43d6c6; } body[data-theme="dark"] .kpi-value.bad{ color:#f58aa2; } body[data-theme="dark"] .kpi-value.warn{ color:#f0b75e; }
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{font-family:var(--ui); background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; font-size:14px; line-height:1.45;}
.mono{font-family:var(--mono); font-variant-numeric:tabular-nums; letter-spacing:-.01em;}
h1,h3{margin:0; font-weight:700; letter-spacing:-.015em;}
h1{font-size:24px;} h3{font-size:14px; font-weight:600;}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit;}
.dim{color:var(--text-2);} .sm{font-size:12px;} .muted-sm{color:var(--muted); font-size:12px;}

/* ---- App layout ---- */
.app{display:grid; grid-template-columns:236px 1fr; min-height:100vh;}
.sidebar{background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; position:sticky; top:0; height:100vh;}
.brand-logo{display:flex; align-items:center; gap:10px; padding:18px 18px 14px;}
.logo-mark{width:28px; height:28px; border-radius:7px; background:linear-gradient(135deg,var(--accent),var(--accent-strong)); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:15px; flex:none;}
.logo-mark-img{width:30px; height:30px; border-radius:8px; flex:none; object-fit:contain;}
.logo-text{font-weight:700; font-size:17px; letter-spacing:-.03em;}
.logo-text small{display:block; font-weight:500; font-size:11px; color:var(--muted); letter-spacing:0;}
.nav{padding:6px 10px; display:flex; flex-direction:column; gap:1px;}
.nav-label{font-size:10.5px; font-weight:700; letter-spacing:.07em; text-transform:uppercase; color:var(--muted); padding:14px 12px 6px;}
.nav-item{display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:8px; color:var(--text-2); font-weight:500; font-size:13.5px; text-align:left; width:100%; position:relative;}
.nav-item:hover{background:var(--surface-2); color:var(--text);}
.nav-item.on{background:var(--accent-soft); color:var(--accent-strong); font-weight:600;}
.nav-item .ico{width:16px; height:16px; flex:none; opacity:.8;}
.nav-item .nbadge{margin-left:auto; font-size:11px; font-weight:600; background:var(--bad-soft); color:var(--bad); padding:1px 7px; border-radius:999px;}
.sidebar-foot{margin-top:auto; padding:14px; border-top:1px solid var(--border); display:flex; align-items:center; gap:10px;}
.sf-meta{font-size:11.5px; color:var(--muted); line-height:1.3;}
.sf-meta b{color:var(--text-2); font-weight:600;}

.main{display:flex; flex-direction:column; min-width:0;}
.topbar{height:56px; background:rgba(255,255,255,.85); backdrop-filter:blur(8px); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:16px; padding:0 24px; position:sticky; top:0; z-index:20;}
.search{position:relative; flex:1; max-width:420px;}
.search input{width:100%; height:36px; border:1px solid var(--border); border-radius:9px; background:var(--surface-2); padding:0 12px 0 34px; font-family:inherit; font-size:13.5px; color:var(--text); outline:none;}
.search input:focus{border-color:var(--accent); background:#fff; box-shadow:0 0 0 3px var(--accent-soft);}
.search .si{position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--muted); pointer-events:none;}
.search-pop{position:absolute; top:42px; left:0; right:0; background:#fff; border:1px solid var(--border); border-radius:10px; box-shadow:var(--shadow-lg); overflow:hidden; max-height:340px; overflow-y:auto; z-index:30;}
.search-item{display:flex; align-items:center; gap:10px; padding:9px 12px; cursor:pointer; font-size:13.5px;}
.search-item:hover,.search-item.hl{background:var(--accent-soft);}
.search-item .si-spend{margin-left:auto; font-size:12px; color:var(--muted);}
.topbar-right{margin-left:auto; display:flex; align-items:center; gap:14px;}
.sync{font-size:12px; color:var(--muted);} .sync b{color:var(--text-2); font-weight:600;}
.user-av{width:30px; height:30px; border-radius:50%; background:var(--accent); color:#fff; font-weight:700; font-size:12px; display:flex; align-items:center; justify-content:center;}
.content{padding:24px 32px 64px; max-width:1560px; width:100%; margin:0 auto;}

/* ---- Page head ---- */
.page-head{display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:20px; gap:16px; flex-wrap:wrap;}
.crumb{font-size:12px; font-weight:600; color:var(--accent); letter-spacing:.02em; margin-bottom:3px;}
.page-head .sub,.brand-head .sub{color:var(--text-2); font-size:13px; margin:5px 0 0;}
.period{display:flex; gap:2px; background:var(--surface); border:1px solid var(--border); border-radius:9px; padding:3px;}
.seg{padding:5px 13px; border-radius:6px; font-size:12.5px; font-weight:600; color:var(--text-2);}
.seg.on{background:var(--accent); color:#fff;}

/* ---- KPI ---- */
.kpi-row{display:grid; grid-template-columns:repeat(5,1fr); gap:14px; margin-bottom:18px;}
.kpi-row.six{grid-template-columns:repeat(6,1fr);}
.kpi-row.seven{grid-template-columns:repeat(7,1fr);}
.ov-status{display:flex; align-items:center; gap:9px; font-size:13px; font-weight:600; color:var(--text-2);}
.ov-status .ov-sep{color:var(--muted);}
.ov-status .ov-date{color:var(--text);}
.live-dot{width:8px; height:8px; border-radius:50%; background:var(--good); box-shadow:0 0 0 0 rgba(18,179,166,.5); animation:livePulse 1.8s infinite;}
.live-txt{color:var(--good); font-weight:700; letter-spacing:.02em;}
@keyframes livePulse{0%{box-shadow:0 0 0 0 rgba(18,179,166,.45);}70%{box-shadow:0 0 0 7px rgba(18,179,166,0);}100%{box-shadow:0 0 0 0 rgba(18,179,166,0);}}
.kpi{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:var(--kpi-pad); box-shadow:var(--shadow);}
.kpi-top{display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; min-height:22px;}
.kpi-label{font-size:11.5px; font-weight:600; color:var(--text-2); letter-spacing:.01em;}
.kpi-top svg{flex:none;}
.kpi-value{font-size:23px; font-weight:700; letter-spacing:-.025em; font-family:var(--mono); line-height:1;}
.kpi-value.good{color:var(--good);} .kpi-value.bad{color:var(--bad);} .kpi-value.warn{color:var(--warn);}
.kpi-sub{font-size:11.5px; color:var(--muted); margin-top:6px;}

/* ---- Cards / grids ---- */
.card{background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:var(--card-pad); box-shadow:var(--shadow); margin-bottom:18px;}
.grid-2{display:grid; grid-template-columns:1.35fr 1fr; gap:18px;}
.card-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; gap:12px;}
.legend{display:flex; align-items:center; gap:7px; font-size:11.5px; color:var(--text-2);}
.legend .lg{width:11px; height:11px; border-radius:3px; display:inline-block;}
.legend .lg.bar{background:var(--accent);} .legend .lg.line{width:14px; height:2.5px; border-radius:2px; background:var(--good);}

/* ---- Charts axis ---- */
.ax{font-family:var(--mono); font-size:9.5px; fill:var(--muted);}
.axb{font-family:var(--mono); font-size:9.5px; font-weight:600; fill:var(--good);}

/* ---- Tables ---- */
.table-card{padding:0; overflow:hidden;}
.table-card .card-head{padding:16px 18px; margin-bottom:0; border-bottom:1px solid var(--border);}
.table-wrap{overflow-x:auto;}
.data-table{width:100%; border-collapse:collapse; font-size:13px;}
.data-table thead th{text-align:left; font-size:11px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; padding:10px 14px; border-bottom:1px solid var(--border); white-space:nowrap; cursor:pointer; user-select:none; background:var(--surface-2); overflow:hidden; text-overflow:ellipsis;}
.col-resizer{position:absolute; top:0; right:0; width:7px; height:100%; cursor:col-resize; user-select:none; z-index:2;}
.col-resizer:hover{background:var(--accent); opacity:.5;}
.data-table thead th.n{text-align:right;}
.th-inner{display:inline-flex; align-items:center; gap:3px;}
.sort{color:var(--accent); font-style:normal;}
.data-table tbody td{padding:var(--row-py) 14px; border-bottom:1px solid var(--border); white-space:nowrap;}
.data-table tbody tr{cursor:pointer; transition:background .08s;}
.data-table tbody tr:hover{background:var(--accent-soft);}
.data-table tbody tr:last-child td{border-bottom:none;}
.data-table td.n{text-align:right;} .data-table td.dim{color:var(--text-2);} .data-table td.strong{font-weight:600; color:var(--text);}
.data-table.compact thead th, .data-table.compact tbody td{padding:7px 12px; font-size:12.5px;}
.data-table.mom td.zero{color:var(--muted); opacity:.55;}
.data-table .sticky{position:sticky; left:0; background:var(--surface); z-index:1; font-weight:500;}
.data-table thead .sticky{background:var(--surface-2);}
.brand-cell{display:flex; align-items:center; gap:9px;}
.brand-name{font-weight:600;}
.brand-dot{width:8px; height:8px; border-radius:50%; flex:none; background:var(--muted);}
.brand-dot.lg{width:11px; height:11px;}
.brand-dot[data-h=good]{background:var(--good);} .brand-dot[data-h=warn]{background:var(--warn);}
.brand-dot[data-h=bad]{background:var(--bad);} .brand-dot[data-h=none]{background:var(--border-strong);}
.region{font-size:9.5px; font-weight:700; letter-spacing:.04em; color:var(--text-2); background:var(--surface-2); border:1px solid var(--border-strong); padding:1px 5px; border-radius:5px;}
.roas-pill{font-family:var(--mono); font-weight:600; font-size:12.5px; padding:2px 8px; border-radius:6px;}
.roas-pill.good{background:var(--good-soft); color:var(--good);} .roas-pill.warn{background:var(--warn-soft); color:var(--warn);}
.roas-pill.bad{background:var(--bad-soft); color:var(--bad);} .roas-pill.none{color:var(--muted);}
.owners{display:flex;} .owners .avatar{margin-left:-6px; border:2px solid var(--surface);} .owners.lg .avatar{width:36px; height:36px; font-size:13px;}
.avatar{width:24px; height:24px; border-radius:50%; color:#fff; font-weight:700; font-size:10px; display:inline-flex; align-items:center; justify-content:center; flex:none;}
.avatar.none{background:var(--surface-2); color:var(--muted); border:1px dashed var(--border-strong);}
.owner-inline{display:inline-flex; align-items:center; gap:7px;} .owner-inline .avatar{width:22px; height:22px;}

/* ---- filter chips ---- */
.filter-chips{display:flex; gap:6px;}
.chip{font-size:12.5px; font-weight:600; color:var(--text-2); padding:5px 12px; border-radius:7px; border:1px solid var(--border); background:var(--surface);}
.chip.on{background:var(--text); color:#fff; border-color:var(--text);}
.chip-count{margin-left:6px; font-size:11px; opacity:.8;}

/* ---- share list ---- */
.share-list{display:flex; flex-direction:column; gap:11px;}
.share-row{display:grid; grid-template-columns:120px 1fr auto auto; align-items:center; gap:10px; cursor:pointer;}
.share-name{font-size:12.5px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.share-track{height:8px; background:var(--surface-2); border-radius:5px; overflow:hidden;}
.share-bar{height:100%; background:var(--accent); border-radius:5px;}
.share-val{font-family:var(--mono); font-size:12px; font-weight:600; text-align:right; min-width:62px;}
.share-pct{font-size:11.5px; color:var(--muted); min-width:34px; text-align:right;}

/* ---- delta / badge ---- */
.delta{font-size:12px; font-weight:600; font-family:var(--mono);}
.delta.up{color:var(--good);} .delta.down{color:var(--bad);} .delta.flat{color:var(--muted);}
.badge{font-size:11px; font-weight:600; padding:2px 9px; border-radius:6px; background:var(--surface-2); color:var(--text-2); border:1px solid var(--border);}
.badge.good{background:var(--good-soft); color:var(--good); border-color:transparent;}
.badge.warn{background:var(--warn-soft); color:var(--warn); border-color:transparent;}
.badge.accent{background:var(--accent-soft); color:var(--accent-strong); border-color:transparent;}
.badge.review{background:#e3f3f5; color:var(--review); border-color:transparent;}

/* ---- brand detail ---- */
.brand-head{margin-bottom:20px;}
.back{font-size:13px; font-weight:600; color:var(--text-2); margin-bottom:12px;}
.back:hover{color:var(--accent);}
.brand-title-row{display:flex; align-items:flex-start; justify-content:space-between; gap:16px;}
.brand-title-row > div:first-child{flex:1; min-width:0;}
.brand-title{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
.brand-title h1{font-size:26px; white-space:nowrap;}
.brand-title .badge{margin-left:4px;}
.chan-split{display:grid; grid-template-columns:auto 1fr; gap:18px; align-items:center;}
.donut-c-v{font-family:var(--mono); font-weight:700; font-size:14px;} .donut-c-l{font-size:10.5px; color:var(--muted);}
.chan-cards{display:flex; flex-direction:column; gap:10px;}
.chan-card{border:1px solid var(--border); border-radius:10px; padding:11px 13px;}
.chan-head{display:flex; align-items:center; gap:8px; margin-bottom:9px;}
.chan-dot{width:9px; height:9px; border-radius:50%;} .chan-title{font-weight:600; font-size:13px;}
.chan-share{margin-left:auto; font-size:11px; color:var(--muted);}
.chan-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px 12px;}
.chan-cell{display:flex; flex-direction:column;} .chan-cell .cl{font-size:10.5px; color:var(--muted);} .chan-cell .cv{font-size:13px; font-weight:600;}
.empty{color:var(--muted); font-size:13px; padding:30px 0; text-align:center;}

/* ---- funnel ---- */
.funnel{display:flex; flex-direction:column; gap:7px;}
.funnel-row{display:grid; grid-template-columns:92px 1fr 92px 46px; align-items:center; gap:10px;}
.funnel-label{font-size:12px; color:var(--text-2); font-weight:500; white-space:nowrap;}
.funnel-track{height:24px; background:var(--surface-2); border-radius:6px; overflow:hidden;}
.funnel-bar{height:100%; background:linear-gradient(90deg,var(--accent),#5b96f5); border-radius:6px; min-width:6px;}
.funnel-val{font-size:12px; font-weight:600; text-align:right;}
.funnel-conv{font-size:11px; color:var(--muted); text-align:right;}

/* ---- empty state ---- */
.empty-state{text-align:center; padding:48px 24px;}
.empty-illo{font-size:42px; color:var(--border-strong); margin-bottom:8px;}
.empty-state h3{font-size:17px; margin-bottom:6px;}
.empty-state p{color:var(--text-2); max-width:440px; margin:0 auto; font-size:13.5px;}

/* ---- team ---- */
.team-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:16px; margin-bottom:18px;}
.team-card{padding:18px;}
.team-top{display:flex; align-items:center; gap:11px; margin-bottom:14px;}
.team-top .avatar{width:40px; height:40px; font-size:14px;}
.team-name{font-weight:700; font-size:15px;} .team-role{font-size:12px; color:var(--muted);}
.team-stats{display:grid; grid-template-columns:repeat(4,1fr); gap:8px; padding:12px 0; border-top:1px solid var(--border); border-bottom:1px solid var(--border); margin-bottom:12px;}
.team-stats > div{display:flex; flex-direction:column;}
.ts-v{font-weight:700; font-size:15px;} .ts-l{font-size:10.5px; color:var(--muted);}
.team-brands{display:flex; flex-wrap:wrap; gap:6px;}
.brand-tag{font-size:11.5px; font-weight:600; color:var(--text-2); background:var(--surface-2); border:1px solid var(--border); padding:3px 9px; border-radius:6px;}
.brand-tag:hover{border-color:var(--accent); color:var(--accent);}

/* ---- alerts ---- */
.alert-summary{display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:18px;}
.alert-stat{display:flex; flex-direction:column; align-items:flex-start; gap:2px; padding:14px 16px; border-radius:var(--radius); border:1px solid var(--border); background:var(--surface); box-shadow:var(--shadow); border-left-width:3px;}
.alert-stat.bad{border-left-color:var(--bad);} .alert-stat.warn{border-left-color:var(--warn);}
.alert-stat.good{border-left-color:var(--good);}
.alert-stat.review{border-left-color:var(--review);} .alert-stat.neutral{border-left-color:var(--border-strong);}
.alert-stat.on{box-shadow:0 0 0 2px var(--accent);}
.as-n{font-size:24px; font-weight:700; font-family:var(--mono);} .as-l{font-size:12px; color:var(--text-2); font-weight:600;}
.alert-list{display:flex; flex-direction:column; gap:9px;}
.alert-item{display:flex; align-items:stretch; gap:13px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:13px 16px 13px 0; box-shadow:var(--shadow); cursor:pointer; overflow:hidden;}
.alert-item:hover{border-color:var(--border-strong);}
.alert-bar{width:3px; border-radius:0 3px 3px 0; flex:none;}
.alert-item.bad .alert-bar{background:var(--bad);} .alert-item.warn .alert-bar{background:var(--warn);}
.alert-item.good .alert-bar{background:var(--good);}
.alert-item.review .alert-bar{background:var(--review);} .alert-item.neutral .alert-bar{background:var(--border-strong);}
.alert-since{font-size:10.5px; font-weight:700; color:var(--muted); background:var(--surface-2); border:1px solid var(--border); padding:1px 6px; border-radius:5px; font-family:var(--mono);}
.alert-action{font-size:12.5px; color:var(--text-2); margin-top:5px;}
.insights-card .link-arrow{font-size:12.5px; color:var(--accent); font-weight:600;}
.insight-strip{display:grid; grid-template-columns:repeat(4,1fr); gap:12px;}
@media(max-width:1080px){ .insight-strip{grid-template-columns:repeat(2,1fr);} }
.insight-pill{text-align:left; border:1px solid var(--border); border-left-width:3px; border-radius:10px; padding:12px 13px; background:var(--surface-2); display:flex; flex-direction:column; gap:5px;}
.insight-pill:hover{border-color:var(--accent); background:var(--surface);}
.insight-pill.bad{border-left-color:var(--bad);} .insight-pill.warn{border-left-color:var(--warn);} .insight-pill.good{border-left-color:var(--good);}
.ip-top{display:flex; align-items:center; justify-content:space-between; gap:8px;}
.ip-brand{font-weight:700; font-size:13.5px;}
.ip-delta{font-size:12.5px; font-weight:700;}
.insight-pill.bad .ip-delta{color:var(--bad);} .insight-pill.warn .ip-delta{color:var(--warn);} .insight-pill.good .ip-delta{color:var(--good);}
.ip-msg{font-size:12px; color:var(--text-2); line-height:1.35;}
.ip-act{font-size:11.5px; color:var(--accent-strong); line-height:1.35;}
.alert-action{font-size:12.5px; color:var(--text-2); margin-top:5px;}
.alert-action .aa-k{font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--accent-strong); background:var(--accent-soft); padding:1px 6px; border-radius:5px; margin-right:7px;}
.alert-body{flex:1; min-width:0;}
.alert-row1{display:flex; align-items:center; gap:9px; margin-bottom:3px;}
.alert-type{font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--text-2);}
.alert-brand{font-size:13px; font-weight:700;}
.alert-msg{font-size:13px; color:var(--text-2);}
.alert-metric{font-size:15px; font-weight:700; align-self:center; color:var(--text);}

/* ---- playbook ---- */
.btn-primary{background:var(--accent); color:#fff; font-weight:600; font-size:13px; padding:8px 15px; border-radius:9px;}
.btn-primary:hover{background:var(--accent-strong);}
.pb-list{display:flex; flex-direction:column; gap:12px;}
.pb-card{display:grid; grid-template-columns:160px 1fr; gap:18px; padding:16px 18px; margin-bottom:0;}
.pb-side{display:flex; flex-direction:column; align-items:flex-start; gap:7px; min-width:0;}
.pb-date{font-family:var(--mono); font-size:11.5px; color:var(--muted); white-space:nowrap;}
.pb-acct{font-weight:700; font-size:14px; text-align:left; white-space:nowrap;} .pb-acct:hover{color:var(--accent);}
.pb-what{font-weight:600; font-size:14.5px; margin-bottom:10px;}
.pb-fields{display:flex; flex-direction:column; gap:7px;}
.pb-field{display:grid; grid-template-columns:80px 1fr; gap:12px; font-size:13px;}
.pb-k{font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); padding-top:1px;}
.pb-v{color:var(--text-2);} .pb-v.accent{color:var(--accent-strong); font-weight:500;}
.pb-foot{text-align:center; color:var(--muted); font-size:12px; margin-top:16px;}

/* ---- scrum grid ---- */
.scrum-card{padding:0; overflow:hidden;}
.scrum-head{padding:18px 20px 14px; margin-bottom:0; align-items:flex-start;}
.scrum-tools{display:flex; align-items:center; gap:8px;}
.tool-btn{display:inline-flex; align-items:center; gap:6px; font-size:12.5px; font-weight:600; color:var(--text-2); padding:6px 11px; border:1px solid var(--border); border-radius:8px; background:var(--surface);}
.tool-btn:hover{border-color:var(--border-strong); color:var(--text);}
.tool-btn.on{background:var(--accent-soft); color:var(--accent-strong); border-color:transparent;}
.tool-btn .td-ico{font-weight:800; font-size:13px;}
.date-range{display:inline-flex; align-items:center; gap:5px; padding:4px 8px; border:1px solid var(--border); border-radius:8px; background:var(--surface); color:var(--text-2);}
.date-range.on{border-color:var(--accent); color:var(--accent-strong); background:var(--accent-soft);}
.date-range select{font-family:inherit; font-size:12.5px; font-weight:600; color:inherit; border:none; background:transparent; outline:none; cursor:pointer; padding:1px 2px;}
.date-range .dr-dash{color:var(--muted);}
.date-range .dr-clear{font-size:15px; line-height:1; color:var(--muted); padding:0 2px;}
.date-range .dr-clear:hover{color:var(--bad);}
@media(max-width:680px){ .scrum-tools{flex-wrap:wrap; justify-content:flex-end;} }
.scrum-legend{display:flex; align-items:center; gap:18px; padding:0 20px 12px; border-bottom:1px solid var(--border);}
.sl-item{display:inline-flex; align-items:center; gap:7px; font-size:11.5px; color:var(--text-2); font-weight:500;}
.sl-sw{width:16px; height:12px; border-radius:3px; border:1px solid var(--border-strong);}
.sl-sw.total-col{background:var(--accent-soft);} .sl-sw.year-col{background:#eef0f3;}
.sl-hint{margin-left:auto; font-size:11px; color:var(--muted);}
.scrum-sections{display:flex; flex-direction:column;}
.scrum-sec{border-bottom:1px solid var(--border);}
.scrum-sec:last-child{border-bottom:none;}
.scrum-sec-head{display:flex; align-items:center; gap:10px; width:100%; padding:13px 20px; text-align:left;}
.scrum-sec-head:hover{background:var(--surface-2);}
.scrum-sec.open .scrum-sec-head{background:var(--surface-2);}
.ss-caret{color:var(--muted); font-size:11px; width:12px;}
.ss-dot{width:9px; height:9px; border-radius:3px; flex:none;}
.ss-title{font-weight:700; font-size:14px;}
.ss-sub{font-size:11.5px; color:var(--muted);}
.ss-stats{margin-left:auto; display:flex; align-items:center; gap:18px; font-family:var(--mono); font-size:12.5px; font-weight:600;}
.ss-stats i{font-style:normal; font-family:var(--ui); font-size:10px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; margin-right:5px;}
.ss-roas b.good{color:var(--good);} .ss-roas b.warn{color:var(--warn);} .ss-roas b.bad{color:var(--bad);} .ss-roas b.none{color:var(--muted);}
@media(max-width:880px){ .ss-stats{display:none;} }

.scrum-wrap{overflow-x:auto; border-top:1px solid var(--border);}
.scrum-table{border-collapse:separate; border-spacing:0; font-size:12px; min-width:100%;}
.scrum-table th, .scrum-table td{padding:7px 12px; white-space:nowrap; border-bottom:1px solid var(--border);}
.scrum-table thead th{font-size:10.5px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.03em; background:var(--surface-2); position:sticky; top:0; z-index:2; text-align:right;}
.scrum-table thead th .th-date{display:block; font-size:8.5px; font-weight:500; color:var(--muted); opacity:.8; letter-spacing:0; margin-top:1px; text-transform:none;}
.scrum-table thead .grp-row th.grp{text-align:center; font-weight:700; color:var(--text-2); font-size:10.5px; border-left:1px solid var(--border-strong); background:#f1f3f6;}
.scrum-table thead .grp-row th.gcorner{background:#f1f3f6;}
.scrum-table thead .grp-row th.year-grp{border-left:1px solid var(--border-strong);}
.metric-col{position:sticky; left:0; z-index:3; background:var(--surface); text-align:left !important; font-weight:500; color:var(--text-2); box-shadow:1px 0 0 var(--border); min-width:158px; max-width:158px; overflow:hidden; text-overflow:ellipsis;}
.scrum-table thead .metric-col{z-index:4; background:var(--surface-2);}
.scrum-table tbody tr:hover td{background:var(--accent-soft);}
.scrum-table tbody tr:hover .metric-col{background:#eef4fe;}
.scrum-table td.n{text-align:right; color:var(--text);}
.scrum-table td.zero{color:var(--muted); opacity:.5;}
.scrum-table .total-col{background:var(--accent-soft);}
.scrum-table thead .total-col{background:#dfeafe;}
.scrum-table .year-col{background:#eef0f3; font-weight:600;}
.scrum-table thead .year-col{background:#e3e6eb;}
.scrum-table .grp-start{border-left:1px solid var(--border-strong);}
.scrum-table tbody tr.headline td{font-weight:700; color:var(--text);}
.scrum-table tbody tr.headline .metric-col{color:var(--text);}
.scrum-table tbody tr.headline td.total-col, .scrum-table tbody tr.headline td.year-col{color:var(--accent-strong);}
/* trend column */
.scrum-table .trend-col{text-align:center; border-left:1px solid var(--border-strong); background:var(--surface-2); position:sticky; right:0; z-index:2;}
.scrum-table thead .trend-col{z-index:3;}
.scrum-table .trend-cell{padding:3px 10px; border-left:1px solid var(--border-strong); background:var(--surface); position:sticky; right:0; box-shadow:-1px 0 0 var(--border);}
.scrum-table tbody tr:hover .trend-cell{background:#eef4fe;}
/* WoW delta chip */
.scrum-table td .cell-v{display:block;}
.wk-d{display:inline-block; font-family:var(--ui); font-size:9.5px; font-weight:700; line-height:1.1; margin-top:1px; letter-spacing:-.01em;}
.wk-d.good{color:var(--good);} .wk-d.bad{color:var(--bad);}
.scrum-table.with-wow td.n{vertical-align:top;}
.scrum-table.with-wow tbody td{padding-top:6px; padding-bottom:6px;}
.scrum-legend .wk-d{font-size:11px; margin:0;}

/* ===== Modern polish: motion, glass, micro-interactions ===== */
@keyframes fadeUp{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:none;}}
@keyframes fadeIn{from{opacity:0;} to{opacity:1;}}
.content{animation:fadeIn .25s ease;}
.screen{animation:fadeUp .4s cubic-bezier(.22,.61,.36,1);}
.kpi, .grid-2 > .card, .insight-pill, .team-card, .alert-item, .pb-card{animation:fadeUp .45s cubic-bezier(.22,.61,.36,1) both;}
.kpi-row .kpi:nth-child(2){animation-delay:.04s} .kpi-row .kpi:nth-child(3){animation-delay:.08s}
.kpi-row .kpi:nth-child(4){animation-delay:.12s} .kpi-row .kpi:nth-child(5){animation-delay:.16s}
.kpi-row .kpi:nth-child(6){animation-delay:.20s} .kpi-row .kpi:nth-child(7){animation-delay:.24s}
.kpi{transition:transform .16s ease, box-shadow .16s ease, border-color .16s ease;}
.kpi:hover{transform:translateY(-3px); box-shadow:var(--shadow-lg); border-color:var(--border-strong);}
.team-card{transition:transform .15s ease, box-shadow .15s ease;}
.team-card:hover{transform:translateY(-3px); box-shadow:var(--shadow-lg);}
.share-row{transition:transform .15s ease;} .share-row:hover{transform:translateX(3px);}
button, .seg, .chip, .nav-item, .tool-btn, .topbar-btn, .icon-btn, .cur-select, .insight-pill{transition:background .15s ease, color .15s ease, border-color .15s ease, transform .12s ease, box-shadow .15s ease;}
.btn-primary:active, .topbar-btn:active, .tool-btn:active, .icon-btn:active, .chip:active, .hamburger:active{transform:scale(.95);}
.nav-item{will-change:transform;} .nav-item:active{transform:scale(.98);}
.data-table tbody tr{transition:background .12s ease;}
.brand-logo .logo-mark-img{transition:transform .35s cubic-bezier(.34,1.56,.64,1);}
.brand-logo:hover .logo-mark-img{transform:rotate(-6deg) scale(1.06);}
/* glass surfaces */
.topbar{backdrop-filter:saturate(160%) blur(12px); -webkit-backdrop-filter:saturate(160%) blur(12px);}
body[data-theme="dark"] .topbar{background:rgba(21,28,44,.72);}
.up-card{backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px); background:rgba(255,255,255,.82);}
body[data-theme="dark"] .up-card{background:rgba(21,28,44,.74);}
.tweaks-panel, .search-pop{backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);}
.nav-item.on{position:relative;}
.nav-item.on::before{content:""; position:absolute; left:0; top:6px; bottom:6px; width:3px; border-radius:0 3px 3px 0; background:var(--accent);}
.up-logo-icon{animation:floaty 4.5s ease-in-out infinite;}
@keyframes floaty{0%,100%{transform:translateY(0);} 50%{transform:translateY(-6px);}}
.dropzone{transition:border-color .18s ease, background .18s ease, transform .18s ease;}
.dropzone:hover{transform:translateY(-2px);}

/* hamburger + mobile nav drawer */
.hamburger{display:none; align-items:center; justify-content:center; width:38px; height:38px; border-radius:9px; color:var(--text-2); background:transparent; border:none; margin-right:2px;}
.hamburger:hover{background:var(--surface-2); color:var(--text);}
.nav-overlay{display:none; position:fixed; inset:0; background:rgba(10,16,28,.45); -webkit-backdrop-filter:blur(2px); backdrop-filter:blur(2px); z-index:50; opacity:0; transition:opacity .25s ease;}

/* ===== Responsive ===== */
@media(max-width:1180px){ .content{max-width:100%;} }
@media(max-width:1080px){
  .grid-2{grid-template-columns:1fr;}
  .kpi-row, .kpi-row.six, .kpi-row.seven{grid-template-columns:repeat(3,1fr);}
  .insight-strip{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:900px){
  .app{grid-template-columns:1fr;}
  .hamburger{display:inline-flex;}
  .sidebar{position:fixed; top:0; left:0; height:100vh; height:100dvh; width:250px; z-index:60;
    transform:translateX(-100%); transition:transform .28s cubic-bezier(.22,.61,.36,1);
    box-shadow:var(--shadow-lg); background:rgba(255,255,255,.94); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);}
  body[data-theme="dark"] .sidebar{background:rgba(21,28,44,.94);}
  .sidebar.open{transform:none;}
  .nav-overlay{display:block; pointer-events:none;}
  .nav-overlay.show{opacity:1; pointer-events:auto;}
}
@media(max-width:760px){
  .kpi-row, .kpi-row.six, .kpi-row.seven, .alert-summary{grid-template-columns:repeat(2,1fr);}
  .content{padding:16px 14px 56px;}
  .topbar{padding:0 12px; gap:8px;}
  .topbar .sync{display:none;}
  .topbar-btn .btn-label{display:none;}
  .topbar-btn{padding:7px 9px;}
  .search{flex:1; min-width:0;}
  .page-head{flex-direction:column; align-items:flex-start; gap:10px;}
  .brand-title-row{flex-wrap:wrap;}
  .brand-title h1{font-size:21px; white-space:normal;}
  .kpi-value{font-size:20px;}
  .pb-form-grid{grid-template-columns:1fr;}
}
@media(max-width:480px){
  .kpi-row, .kpi-row.six, .kpi-row.seven{grid-template-columns:1fr 1fr;}
  .insight-strip, .team-grid{grid-template-columns:1fr;}
  .alert-summary{grid-template-columns:1fr 1fr;}
}
@media(prefers-reduced-motion:reduce){ *, .screen, .kpi, .card, .sidebar{animation:none !important; transition:none !important;} }

/* ---- CRUD: playbook form, team edit, custom alerts, comments ---- */
.pb-form{padding:18px 20px;}
.pb-form-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px 16px;}
.pb-form-grid label{display:flex; flex-direction:column; gap:5px; font-size:11.5px; font-weight:600; color:var(--text-2);}
.pb-form-grid label.pb-wide{grid-column:1 / -1;}
.pb-form-grid input, .pb-form-grid select{height:36px; border:1px solid var(--border-strong); border-radius:8px; padding:0 10px; font-family:inherit; font-size:13.5px; color:var(--text); background:var(--surface-2); outline:none;}
.pb-form-grid input:focus, .pb-form-grid select:focus{border-color:var(--accent); background:var(--surface); box-shadow:0 0 0 3px var(--accent-soft);}
.pb-form-foot{display:flex; justify-content:flex-end; gap:9px; margin-top:14px;}
.pb-del{margin-top:6px; font-size:15px; line-height:1; color:var(--muted); padding:2px 6px;}
.pb-del:hover{color:var(--bad);}
.tl-input{height:32px; border:1px solid var(--border-strong); border-radius:7px; padding:0 9px; font-family:inherit; font-size:13px; color:var(--text); background:var(--surface-2); outline:none; max-width:150px;}
.tl-input:focus{border-color:var(--accent); background:var(--surface);}
.tl-actions{display:inline-flex; gap:6px;}
.tl-btn{font-size:12px; font-weight:600; color:var(--text-2); padding:4px 10px; border:1px solid var(--border); border-radius:7px; background:var(--surface);}
.tl-btn:hover{border-color:var(--accent); color:var(--accent);}
.tl-btn.save{background:var(--accent); color:#fff; border-color:var(--accent);}
.ca-card{padding:16px 18px; margin-bottom:18px;}
.ca-form{display:flex; align-items:center; gap:9px; flex-wrap:wrap; font-size:13px; color:var(--text-2); margin-bottom:12px;}
.ca-form select, .ca-form input{height:34px; border:1px solid var(--border-strong); border-radius:8px; padding:0 9px; font-family:inherit; font-size:13px; color:var(--text); background:var(--surface-2); outline:none;}
.ca-rules{display:flex; flex-wrap:wrap; gap:8px;}
.ca-rule{display:inline-flex; align-items:center; gap:8px; font-size:12.5px; font-weight:600; color:var(--text-2); background:var(--surface-2); border:1px solid var(--border); padding:5px 10px; border-radius:999px;}
.ca-rule button{font-size:14px; line-height:1; color:var(--muted);}
.ca-rule button:hover{color:var(--bad);}
.comments-card{padding:16px 18px;}
.cm-add{display:grid; grid-template-columns:220px 1fr auto; gap:10px; align-items:start; margin-bottom:14px;}
@media(max-width:760px){ .cm-add{grid-template-columns:1fr;} }
.cm-text{min-height:38px; max-height:120px; resize:vertical; border:1px solid var(--border-strong); border-radius:8px; padding:9px 11px; font-family:inherit; font-size:13.5px; color:var(--text); background:var(--surface-2); outline:none;}
.cm-text:focus{border-color:var(--accent); background:var(--surface); box-shadow:0 0 0 3px var(--accent-soft);}
.cm-list{display:flex; flex-direction:column; gap:10px;}
.cm-item{border:1px solid var(--border); border-radius:9px; padding:10px 12px; background:var(--surface-2);}
.cm-meta{display:flex; align-items:center; gap:9px; margin-bottom:5px;}
.cm-week-tag{font-size:10.5px; font-weight:700; color:var(--accent-strong); background:var(--accent-soft); padding:1px 7px; border-radius:5px;}
.cm-date{font-size:11px; color:var(--muted);}
.cm-del{margin-left:auto; font-size:15px; line-height:1; color:var(--muted); padding:0 4px;}
.cm-del:hover{color:var(--bad);}
.cm-body{font-size:13px; color:var(--text); line-height:1.4; white-space:pre-wrap;}

/* ---- Upload screen ---- */
.uploader{min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; background:radial-gradient(1100px 560px at 50% -15%, #efeaff 0%, #e9f4fb 35%, var(--bg) 70%);}
.up-card{width:100%; max-width:560px; background:var(--surface); border:1px solid var(--border); border-radius:18px; box-shadow:var(--shadow-lg); padding:34px 34px 28px; text-align:center;}
.up-brand{display:flex; align-items:center; justify-content:center; margin-bottom:20px;}
.up-logo-icon{width:60px; height:60px; border-radius:15px; box-shadow:0 8px 22px rgba(108,71,255,.28);}
.up-card h1{font-size:22px; margin-bottom:6px;}
.up-card .up-sub{color:var(--text-2); font-size:14px; margin-bottom:24px; line-height:1.5;}
.dropzone{border:2px dashed var(--border-strong); border-radius:14px; padding:38px 24px; cursor:pointer; transition:.15s; background:var(--surface-2);}
.dropzone:hover,.dropzone.drag{border-color:var(--accent); background:var(--accent-soft);}
.dz-ico{width:46px; height:46px; margin:0 auto 12px; color:var(--accent);}
.dz-title{font-weight:700; font-size:15px; margin-bottom:4px;}
.dz-hint{color:var(--muted); font-size:12.5px;}
.up-or{display:flex; align-items:center; gap:12px; margin:22px 0 14px; color:var(--muted); font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:.04em;}
.up-or::before,.up-or::after{content:""; flex:1; height:1px; background:var(--border);}
.up-sheet{display:flex; gap:9px;}
.up-sheet-input{flex:1; height:42px; border:1px solid var(--border-strong); border-radius:10px; padding:0 13px; font-family:inherit; font-size:13.5px; color:var(--text); outline:none; background:var(--surface-2);}
.up-sheet-input:focus{border-color:var(--accent); background:#fff; box-shadow:0 0 0 3px var(--accent-soft);}
.up-sheet .btn-primary{padding:0 18px; border-radius:10px; white-space:nowrap;}
.up-sheet-hint{margin-top:9px; font-size:11.5px; color:var(--muted); text-align:left;}
.up-foot{margin-top:20px; display:flex; align-items:center; justify-content:center; gap:14px; flex-wrap:wrap; font-size:13px; color:var(--text-2);}
.up-link{color:var(--accent); font-weight:600;}
.up-link:hover{text-decoration:underline;}
.up-err{margin-top:16px; background:var(--bad-soft); color:var(--bad); border-radius:9px; padding:11px 14px; font-size:13px; text-align:left;}
.up-busy{margin-top:18px; color:var(--text-2); font-size:13.5px; display:flex; align-items:center; gap:9px; justify-content:center;}

@keyframes spin{to{transform:rotate(360deg);}}

const NAV = [

}

function Sidebar({ route, navigate, alertCount, open, onClose }) {

function TopSearch({ navigate }) {
  const M = window.MODEL;
  const [q, setQ] = useState("");
  const [open, setOpen] = useState(false);
  const [hl, setHl] = useState(0);
  const ref = useRef();
  const matches = q ? M.brands.filter(b => b.key.toLowerCase().includes(q.toLowerCase())).slice(0, 8) : [];
  useEffect(() => {
    const h = e => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", h); return () => document.removeEventListener("mousedown", h);
  }, []);
  const go = b => { navigate("brand", b.key); setQ(""); setOpen(false); };
  return (
    <div className="search" ref={ref}>
      <svg className="si" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="7" /><path d="M21 21l-4-4" /></svg>
      <input placeholder="Jump to a brand…" value={q}
        onChange={e => { setQ(e.target.value); setOpen(true); setHl(0); }}
        onFocus={() => setOpen(true)}
        onKeyDown={e => {
          if (e.key === "ArrowDown") { setHl(h => Math.min(h + 1, matches.length - 1)); e.preventDefault(); }
          if (e.key === "ArrowUp") { setHl(h => Math.max(h - 1, 0)); e.preventDefault(); }
          if (e.key === "Enter" && matches[hl]) go(matches[hl]);
          if (e.key === "Escape") setOpen(false);
        }} />
      {open && matches.length > 0 && (
        <div className="search-pop">
          {matches.map((b, i) => (
            <div key={b.key} className={"search-item " + (i === hl ? "hl" : "")} onMouseEnter={() => setHl(i)} onClick={() => go(b)}>
              <span className="brand-dot" data-h={window.roasHealth(b.dashRoas)} />
              <span style={{ fontWeight: 600 }}>{b.key}</span>
              <span className="si-spend">{b.active ? window.inr(b.spend) : "no spend"}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function App({ onReset, fileInfo, onRefresh }) {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [theme, setTheme] = useState(() => localStorage.getItem("performity.theme") || "light");
  const [cur, setCur] = useState(() => localStorage.getItem("performity.cur") || "INR");
  const [fx, setFx] = useState(() => loadFxCache());
  const [, setRebuild] = useState(0);
  useEffect(() => { fetchFx().then(setFx); }, []);
  // when live FX arrives, re-normalize brand currencies to the INR base and re-render
  useEffect(() => { window.__fx = fx; if (window.AGENCY) { window.buildModel(); setRebuild(r => r + 1); } }, [fx]);
  useEffect(() => { document.body.setAttribute("data-theme", theme); localStorage.setItem("performity.theme", theme); }, [theme]);
  useEffect(() => { localStorage.setItem("performity.cur", cur); }, [cur]);
  // set the active display currency before any view renders (source data is INR)
  window.applyCurrency(cur, fx);
  window.__perfInfo = fileInfo;
  const parseHash = () => {
    const h = decodeURIComponent(window.location.hash.replace(/^#\/?/, ""));
    const [screen, ...rest] = h.split("/");
    if (screen === "brand") return { screen: "brand", brand: rest.join("/") };
    if (["overview", "drr", "alerts", "team", "playbook"].includes(screen)) return { screen };
    return { screen: "overview" };
  };
  const [route, setRoute] = useState(parseHash());
  const [navOpen, setNavOpen] = useState(false);
  useEffect(() => {
    const h = () => setRoute(parseHash());
    window.addEventListener("hashchange", h); return () => window.removeEventListener("hashchange", h);
  }, []);
  const navigate = (screen, brand) => {
    window.location.hash = "/" + screen + (brand ? "/" + encodeURIComponent(brand) : "");
    window.scrollTo(0, 0);
    setNavOpen(false);
  };

  // apply tweaks
  useEffect(() => {
    const r = document.documentElement.style;
    r.setProperty("--accent", t.accent);
    r.setProperty("--accent-strong", ACCENTS[t.accent] || t.accent);
    r.setProperty("--accent-soft", ACCENT_SOFT[t.accent] || "#eaf1fe");
    document.body.setAttribute("data-density", t.density);
  }, [t]);

  const M = window.MODEL;
  const alertCount = M.alerts.filter(a => a.sev === "critical" || a.sev === "warn").length;

  let view;
  if (route.screen === "brand") view = <BrandDetail brandKey={route.brand} navigate={navigate} />;
  else if (route.screen === "drr") view = <DRR navigate={navigate} />;
  else if (route.screen === "alerts") view = <Alerts navigate={navigate} />;
  else if (route.screen === "team") view = <Team navigate={navigate} />;
  else if (route.screen === "playbook") view = <Playbook navigate={navigate} />;
  else view = <Overview navigate={navigate} />;

  return (
    <div className="app">
      <Sidebar route={route} navigate={navigate} alertCount={alertCount} open={navOpen} onClose={() => setNavOpen(false)} />
      <div className="main">
        <header className="topbar">
          <button className="hamburger" onClick={() => setNavOpen(true)} aria-label="Open menu">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
          </button>
          <TopSearch navigate={navigate} />
          <div className="topbar-right">
            <span className="sync">{new Date().toLocaleDateString("en-GB", { day: "numeric", month: "short", year: "numeric" })} · <b>{M.activeBrands.length}</b> active{fileInfo && fileInfo.source === "gsheet" ? " · live" : ""}</span>
            <select className="cur-select" value={cur} onChange={e => setCur(e.target.value)}
              title={cur === "INR" ? "Display currency (data is in ₹)" : "Converted from ₹ at live rate " + (window.CURRENCY.rate ? window.CURRENCY.rate.toPrecision(4) : "")}>
              {Object.keys(window.CURRENCIES).map(code => <option key={code} value={code}>{code}</option>)}
            </select>
            <button className="icon-btn" onClick={() => setTheme(theme === "dark" ? "light" : "dark")} title={theme === "dark" ? "Switch to light" : "Switch to dark"}>
              {theme === "dark"
                ? <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4" /><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" /></svg>
                : <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.8A9 9 0 1111.2 3a7 7 0 009.8 9.8z" /></svg>}
            </button>
            {onRefresh && (
              <button className="topbar-btn" onClick={onRefresh} title="Pull the latest from the connected Google Sheet">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
                <span className="btn-label">Refresh</span>
              </button>
            )}
            <button className="topbar-btn" onClick={onReset} title={fileInfo ? "Loaded: " + fileInfo.file : "Upload a new workbook / connect a sheet"}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
              <span className="btn-label">{fileInfo && fileInfo.source === "gsheet" ? "Change source" : "New upload"}</span>
            </button>
            <div className="user-av">RS</div>
          </div>
        </header>
        <main className="content">{view}</main>
      </div>
      <TweaksPanel>
        <TweakSection label="Appearance" />
        <TweakColor label="Accent" value={t.accent} options={["#0978BE", "#12b3a6", "#6c47ff", "#e8902a"]} onChange={v => setTweak("accent", v)} />
        <TweakRadio label="Density" value={t.density} options={["compact", "regular"]} onChange={v => setTweak("density", v)} />
      </TweaksPanel>
    </div>
  );
}

/* ---------------- Data bootstrap (upload / persistence) ---------------- */
const STORE_KEY = "performity.data.v1";
const INFO_KEY = "performity.info.v1";

function applyData(d) {
  window.AGENCY = d.AGENCY;
  window.WEEKLY_RAW = d.WEEKLY || {};
  window.WEEKLY_META = d.WEEKLY_META || {};
  if (window.PerformityParser && PerformityParser.augmentWeekly) PerformityParser.augmentWeekly(window.WEEKLY_RAW);
  window.__fx = loadFxCache();
  window.buildModel(); // normalizes WEEKLY_RAW -> window.WEEKLY in the chosen base
}
function persist(d, info) {
  try {
    localStorage.setItem(STORE_KEY, JSON.stringify(d));
    localStorage.setItem(INFO_KEY, JSON.stringify(info || {}));
    return true;
  } catch (e) { console.warn("Could not persist (data too large for localStorage?)", e); return false; }
}
function loadSaved() {
  try { const s = localStorage.getItem(STORE_KEY); return s ? JSON.parse(s) : null; } catch (e) { return null; }
}
function loadInfo() {
  try { const s = localStorage.getItem(INFO_KEY); return s ? JSON.parse(s) : null; } catch (e) { return null; }
}

// ---- Live FX rates (base INR), cached 12h. Free, no key, CORS-open. ----
const FX_KEY = "performity.fx.v1";
function loadFxCache() { try { return JSON.parse(localStorage.getItem(FX_KEY)); } catch (e) { return null; } }
function fetchFx() {
  const cached = loadFxCache();
  if (cached && cached.rates && (Date.now() - cached.ts) < 12 * 3600 * 1000) return Promise.resolve(cached);
  return fetch("https://open.er-api.com/v6/latest/INR")
    .then(r => r.json())
    .then(d => {
      if (d && d.rates) {
        const fx = { rates: d.rates, ts: Date.now() };
        try { localStorage.setItem(FX_KEY, JSON.stringify(fx)); } catch (e) {}
        return fx;
      }
      return cached || { rates: {}, ts: 0 };
    })
    .catch(() => cached || { rates: {}, ts: 0 });
}

// ---- Google Sheets live connection (no API key; sheet shared view-only) ----
function sheetIdFromUrl(url) {
  const s = String(url || "").trim();
  const m = s.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/) || s.match(/[?&]id=([a-zA-Z0-9-_]+)/);
  if (m) return m[1];
  return /^[a-zA-Z0-9-_]{20,}$/.test(s) ? s : null;
}
function fetchSheetData(url) {
  const id = sheetIdFromUrl(url);
  if (!id) return Promise.reject(new Error("That doesn't look like a Google Sheets link. Paste the full URL from your browser."));
  const xurl = "https://docs.google.com/spreadsheets/d/" + id + "/export?format=xlsx";
  return fetch(xurl).then((r) => {
    if (!r.ok) throw new Error("Couldn't open the sheet (HTTP " + r.status + "). Make sure sharing is set to “Anyone with the link → Viewer”.");
    return r.arrayBuffer();
  }).then((buf) => {
    const wb = XLSX.read(new Uint8Array(buf), { type: "array" });
    return PerformityParser.parse(wb);
  }).catch((err) => {
    if (err instanceof TypeError) // network / CORS
      throw new Error("Couldn't reach the sheet. Check the link and make sure it's shared “Anyone with the link → Viewer”.");
    throw err;
  });
}

// Loads the bundled sample dataset (data.js + weekly-data.js) on demand.
function loadSampleData() {
  const load = (src) => new Promise((res, rej) => {
    const s = document.createElement("script");
    s.src = src; s.onload = res; s.onerror = () => rej(new Error("Could not load sample file: " + src));
    document.head.appendChild(s);
  });
  return load("data.js").then(() => load("weekly-data.js")).then(() => ({
    AGENCY: window.AGENCY, WEEKLY: window.WEEKLY, WEEKLY_META: window.WEEKLY_META
  }));
}

function UploadScreen({ onLoaded, initialUrl, initialError }) {
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState(initialError || null);
  const [drag, setDrag] = useState(false);
  const [hasSample, setHasSample] = useState(false);
  const [sheetUrl, setSheetUrl] = useState(initialUrl || "");
  const inputRef = useRef();

  // Only offer the sample button if the sample dataset is actually present
  // (it's excluded from the public repo, so it won't exist on the live site).
  useEffect(() => {
    fetch("data.js", { method: "HEAD" }).then((r) => setHasSample(r.ok)).catch(() => setHasSample(false));
  }, []);

  // Validate → persist → hand off to the app. Throws if the workbook has no brands.
  const finish = (data, info) => {
    if (!data.AGENCY || !data.AGENCY.summary.length)
      throw new Error("No brands found. Make sure this is the Catalys Agency Overview workbook (with a '1. Summary' sheet).");
    persist(data, info);
    onLoaded(data, info);
  };

  const handleFile = (file) => {
    if (!file) return;
    setBusy(true); setErr(null);
    const reader = new FileReader();
    reader.onerror = () => { setErr("Could not read the file."); setBusy(false); };
    reader.onload = (e) => {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), { type: "array" });
        finish(PerformityParser.parse(wb), { file: file.name, source: "file", at: Date.now() });
      } catch (ex) { setErr(ex.message || String(ex)); setBusy(false); }
    };
    reader.readAsArrayBuffer(file);
  };

  const connectSheet = () => {
    if (!sheetUrl.trim()) return;
    setBusy(true); setErr(null);
    fetchSheetData(sheetUrl).then((data) => {
      finish(data, { file: "Google Sheet", source: "gsheet", url: sheetUrl.trim(), at: Date.now() });
    }).catch((ex) => { setErr(ex.message || String(ex)); setBusy(false); });
  };

  const loadSample = () => {
    setBusy(true); setErr(null);
    loadSampleData().then((data) => {
      finish(data, { file: "Sample dataset", source: "sample", at: Date.now() });
    }).catch((ex) => { setErr(ex.message || String(ex)); setBusy(false); });
  };

  return (
    <div className="uploader">
      <div className="up-card">
        <div className="up-brand">
          <img className="up-logo-icon" src="assets/logo-icon.png" alt="Performity" />
        </div>
        <h1>Upload your Agency Overview</h1>
        <p className="up-sub">Drop in your <b>Catalys Agency Overview</b> Excel workbook (.xlsx) and Performity builds your live portfolio dashboard — brands, channels, weekly scrum, alerts and team rollups.</p>

        <div className={"dropzone" + (drag ? " drag" : "")}
          onClick={() => inputRef.current.click()}
          onDragOver={(e) => { e.preventDefault(); setDrag(true); }}
          onDragLeave={() => setDrag(false)}
          onDrop={(e) => { e.preventDefault(); setDrag(false); handleFile(e.dataTransfer.files[0]); }}>
          <svg className="dz-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
          <div className="dz-title">Click to browse or drag your .xlsx here</div>
          <div className="dz-hint">Catalys_Agency_Overview_2026.xlsx</div>
        </div>
        <input ref={inputRef} type="file" accept=".xlsx,.xls,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" style={{ display: "none" }}
          onChange={(e) => handleFile(e.target.files[0])} />

        <div className="up-or"><span>or connect a live Google Sheet</span></div>
        <div className="up-sheet">
          <input className="up-sheet-input" type="url" placeholder="Paste your Google Sheet link…" value={sheetUrl}
            onChange={(e) => setSheetUrl(e.target.value)}
            onKeyDown={(e) => { if (e.key === "Enter") connectSheet(); }} />
          <button className="btn-primary" onClick={connectSheet} disabled={!sheetUrl.trim() || busy}>Connect</button>
        </div>
        <div className="up-sheet-hint">Share the sheet as “Anyone with the link → Viewer”. It refreshes automatically every time you open the tool.</div>

        {busy && <div className="up-busy"><span className="spin" /> Loading data…</div>}
        {err && <div className="up-err">{err}</div>}

        {hasSample && (
          <div className="up-foot">
            <span>No file handy?</span>
            <button className="up-link" onClick={loadSample}>Load sample dataset →</button>
          </div>
        )}
      </div>
      <p className="up-note">Your file is parsed entirely in your browser — nothing is uploaded to a server. Parsed data is cached locally so it stays after a refresh.</p>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));

function Loading({ label }) {
  return (
    <div className="uploader">
      <div className="up-card" style={{ textAlign: "center", paddingTop: 44, paddingBottom: 44 }}>
        <div className="up-brand"><img className="up-logo-icon" src="assets/logo-icon.png" alt="Performity" /></div>
        <div className="up-busy"><span className="spin" /> {label}</div>
      </div>
    </div>
  );
}

function resetData() {
  try { localStorage.removeItem(STORE_KEY); localStorage.removeItem(INFO_KEY); } catch (e) {}
  boot(true);
}

function showUpload(opts) {
  opts = opts || {};
  root.render(<UploadScreen initialUrl={opts.url} initialError={opts.error}
    onLoaded={(data, info) => { applyData(data); renderApp(info); }} />);
}

// Re-pull the latest data from a connected Google Sheet.
function refreshFromSheet() {
  const info = loadInfo();
  if (!info || info.source !== "gsheet" || !info.url) return;
  root.render(<Loading label="Refreshing from Google Sheet…" />);
  fetchSheetData(info.url).then((data) => {
    persist(data, Object.assign({}, info, { at: Date.now() }));
    applyData(data); renderApp(Object.assign({}, info, { at: Date.now() }));
  }).catch(() => {
    const saved = loadSaved();
    if (saved && saved.AGENCY) { applyData(saved); renderApp(info); }
  });
}

function renderApp(info) {
  root.render(<App onReset={resetData} fileInfo={info}
    onRefresh={info && info.source === "gsheet" ? refreshFromSheet : null} />);
}

function boot(forceUpload) {
  const info = forceUpload ? null : loadInfo();

  // ?sheet=<link|id> — connect (or switch) to a Google Sheet from the URL.
  const sheetParam = new URLSearchParams(window.location.search).get("sheet");
  if (!forceUpload && sheetParam) {
    root.render(<Loading label="Connecting to Google Sheet…" />);
    fetchSheetData(sheetParam).then((data) => {
      const ni = { file: "Google Sheet", source: "gsheet", url: sheetParam, at: Date.now() };
      persist(data, ni); applyData(data); renderApp(ni);
    }).catch((ex) => showUpload({ url: sheetParam, error: (ex && ex.message) || "Couldn't connect to that sheet." }));
    return;
  }

  // Connected Google Sheet → pull the latest on every open (cache is fallback).
  if (info && info.source === "gsheet" && info.url) {
    root.render(<Loading label="Loading latest from Google Sheet…" />);
    fetchSheetData(info.url).then((data) => {
      persist(data, Object.assign({}, info, { at: Date.now() }));
      applyData(data); renderApp(Object.assign({}, info, { at: Date.now() }));
    }).catch((ex) => {
      const saved = loadSaved();
      if (saved && saved.AGENCY) { applyData(saved); renderApp(Object.assign({ stale: true }, info)); }
      else showUpload({ url: info.url, error: (ex && ex.message) || "Couldn't load the connected sheet." });
    });
    return;
  }

  const saved = forceUpload ? null : loadSaved();
  if (saved && saved.AGENCY) { applyData(saved); renderApp(info); return; }

  // ?demo=1 — auto-load the bundled sample dataset (handy shareable demo link)
  if (!forceUpload && /[?&]demo\b/.test(window.location.search)) {
    loadSampleData().then((data) => {
      applyData(data); renderApp({ file: "Sample dataset", source: "sample", at: Date.now() });
    }).catch(() => showUpload());
    return;
  }
  showUpload();
}

boot();
</script>
</body>
</html>
